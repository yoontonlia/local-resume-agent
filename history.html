<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>分析历史记录 - 简历智能中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #f0f3fa;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h2 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #e0d6ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn-back, .btn-small {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        
        .btn-danger {
            background: rgba(244, 67, 54, 0.85);
            border-color: rgba(255, 100, 100, 0.4);
        }
        
        .btn-danger:hover {
            background: rgba(244, 67, 54, 1);
            transform: translateY(-1px);
            border-color: rgba(255, 160, 160, 0.8);
        }
        
        .btn-back:hover, .btn-small:hover {
            background: rgba(255, 255, 255, 0.32);
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        /* 统计卡片 */
        .stats-card {
            background: rgba(25, 20, 48, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .stats-count {
            font-size: 15px;
            font-weight: 500;
            color: #ddd0ff;
        }
        
        .stats-count span {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #d9cdff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-right: 6px;
        }
        
        #statsInfo {
            font-size: 13px;
            color: #bcb2ff;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
        }
        
        /* 历史列表主容器 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 560px;
            overflow-y: auto;
            padding-right: 6px;
        }
        
        .history-item {
            background: rgba(25, 20, 48, 0.78);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }
        
        .history-item:hover {
            background: rgba(45, 38, 85, 0.85);
            transform: translateY(-2px);
            border-color: rgba(167, 139, 250, 0.6);
        }
        
        .history-item.analysis {
            border-left: 5px solid #3b82f6;
        }
        
        .history-item.match {
            border-left: 5px solid #10b981;
        }
        
        .history-item.optimize {
            border-left: 5px solid #f59e0b;
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .history-file {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            word-break: break-word;
        }
        
        .history-type {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .history-type.analysis {
            background: #2563eb;
            color: white;
        }
        
        .history-type.match {
            background: #059669;
            color: white;
        }
        
        .history-type.optimize {
            background: #ea580c;
            color: white;
        }
        
        .history-time {
            font-size: 12px;
            font-weight: 500;
            color: #bfb9f0;
        }
        
        .history-score {
            background: rgba(16, 185, 129, 0.25);
            color: #a7f3d0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .history-depth {
            background: rgba(59, 130, 246, 0.25);
            color: #bfdbfe;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .history-preview {
            font-size: 13px;
            color: #e2dcff;
            line-height: 1.55;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .history-actions {
            display: flex;
            gap: 14px;
            margin-top: 16px;
            justify-content: flex-end;
        }
        
        .btn-view, .btn-delete {
            padding: 7px 18px;
            border: none;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-view {
            background: rgba(59, 130, 246, 0.9);
            color: white;
        }
        
        .btn-view:hover {
            background: #3b82f6;
            transform: translateY(-1px);
        }
        
        .btn-delete {
            background: rgba(244, 67, 54, 0.9);
            color: white;
        }
        
        .btn-delete:hover {
            background: #ef4444;
            transform: translateY(-1px);
        }
        
        .empty-state {
            text-align: center;
            padding: 64px 28px;
            color: #cdc9ff;
            font-size: 16px;
            background: rgba(25, 20, 48, 0.6);
            border-radius: 32px;
            backdrop-filter: blur(8px);
        }
        
        /* 底部水印 */
        .footer {
            margin-top: 36px;
            text-align: center;
            font-size: 12px;
            color: #9b94d4;
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 模态框（详情弹窗） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1e1a3a;
            border-radius: 32px;
            width: 90%;
            max-width: 700px;
            max-height: 80%;
            overflow: auto;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .modal-header strong {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .close-modal {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            font-size: 24px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-modal:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .modal-body {
            font-size: 14px;
            line-height: 1.7;
            color: #f3efff;
            white-space: pre-wrap;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        /* 滚动条优化 */
        .history-list::-webkit-scrollbar,
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        
        .history-list::-webkit-scrollbar-track,
        .modal-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        
        .history-list::-webkit-scrollbar-thumb,
        .modal-body::-webkit-scrollbar-thumb {
            background: #a78bfa;
            border-radius: 10px;
        }
        
        /* 辅助增强 */
        .history-score, .history-depth {
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        
        .btn-view, .btn-delete {
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📜 分析历史记录 · 档案库</h2>
        <div class="header-actions">
            <button id="exportJsonBtn" class="btn-small">📄 导出 JSON</button>
            <button id="exportMdBtn" class="btn-small">📝 导出 Markdown</button>
            <button id="clearAllBtn" class="btn-small btn-danger">🗑️ 清空全部</button>
            <button class="btn-back" id="backBtn">← 返回看板</button>
        </div>
    </div>
    
    <div class="content">
        <div class="stats-card">
            <div class="stats-count">📊 总计 <span id="recordCount">0</span> 条记录</div>
            <div id="statsInfo" style="font-size: 13px; font-weight: 500;"></div>
        </div>
        
        <div id="historyList" class="history-list">
            <div class="empty-state">✨ 暂无分析记录<br>返回主界面进行简历分析后会自动保存</div>
        </div>
    </div>
    
    <div class="footer">
        🔒 所有数据保存在本地浏览器中，隐私安全，不会上传
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <strong id="modalTitle">📄 报告详情</strong>
            <button class="close-modal" id="closeModalBtn">✕</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<!-- 核心脚本依赖（保持原有逻辑） -->
<script src="lib/history-manager.js"></script>
<script src="history.js"></script>

<!-- 额外的样式补丁与交互增强，确保所有动态文字清晰 -->
<script>
    (function() {
        // 注入额外样式，增强对比度与模态框体验
        const extraStyle = document.createElement('style');
        extraStyle.textContent = `
            .modal-body strong, .modal-body b {
                color: #ffd966;
            }
            .modal-body ul, .modal-body ol {
                margin-left: 1.3rem;
            }
            .btn-small, .btn-back, .btn-danger {
                font-weight: 600;
            }
            .history-preview {
                opacity: 0.95;
            }
            .stats-count span {
                text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            }
            .empty-state {
                font-weight: 500;
            }
        `;
        document.head.appendChild(extraStyle);
        
        // 保证模态框关闭逻辑可用（适配history.js可能存在的绑定）
        window.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('detailModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            if (closeModalBtn && modal) {
                closeModalBtn.addEventListener('click', function() {
                    modal.style.display = 'none';
                });
                // 点击模态框背景关闭
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) modal.style.display = 'none';
                });
            }
            
            // 美化统计信息区域，若有额外信息可动态
            const recordSpan = document.getElementById('recordCount');
            if (recordSpan && recordSpan.innerText === '0') {
                const statsInfoDiv = document.getElementById('statsInfo');
                if (statsInfoDiv && statsInfoDiv.innerText === '') {
                    statsInfoDiv.innerText = '暂无历史数据，开始分析吧';
                }
            }
        });
    })();
</script>
</body>
</html>
